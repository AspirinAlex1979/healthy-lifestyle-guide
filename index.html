<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Регенерація | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background: #000 url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover; color: white; height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 40px; padding: 40px;
            width: 95%; max-width: 550px; text-align: center; display: none;
        }
        .active { display: block !important; }
        .btn-premium {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 18px; border-radius: 15px; width: 100%; margin-bottom: 12px; cursor: pointer; text-align: center;
        }
        .btn-main {
            background: #ffffff; color: #000; padding: 20px 50px; border-radius: 50px; font-weight: 800; cursor: pointer; border: none;
        }
        .donate-box { background: rgba(255, 255, 255, 0.05); border: 2px dashed rgba(255, 255, 255, 0.4); border-radius: 20px; padding: 20px; margin: 20px 0; }
        .res-img { width: 100%; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="welcome" class="glass-card active">
        <h1 class="text-4xl font-bold mb-4">Smart Регенерація 🏔️</h1>
        <p class="mb-8 opacity-80">Пройди тест, підтримай збір та отримай план відновлення.</p>
        <button onclick="showScreen('q1')" class="btn-main">Почати</button>
    </div>

    <div id="q1" class="glass-card">
        <h2 class="text-2xl font-bold mb-6">Твоя головна ціль?</h2>
        <button onclick="finish('weight')" class="btn-premium">🎯 Схуднення</button>
        <button onclick="finish('health')" class="btn-premium">🧘‍♂️ Енергія</button>
    </div>

    <div id="donate" class="glass-card">
        <h2 class="text-3xl font-bold mb-4 text-yellow-400">Підтримай ЗСУ 🇺🇦</h2>
        <p>Для доступу до посібника, закинь будь-який донат на нашу банку.</p>
        <div class="donate-box">
            <a href="https://send.monobank.ua/jar/7rKuk6iVx" target="_blank" class="btn-main block text-center" style="background:#e91e63; color:white;">💰 Перейти до Банки</a>
        </div>
        <button onclick="showScreen('result')" class="btn-premium">✅ Я підтримав!</button>
    </div>

    <div id="result" class="glass-card" style="max-height: 90vh; overflow-y: auto;">
        <h2 class="text-2xl font-bold mb-6">Твій План 🏆</h2>
        <img src="images/plate.jpg" onerror="this.src='https://phc.org.ua/sites/default/files/inline/images/Plate_UKR_0.jpg'" class="res-img">
        <div class="space-y-3">
            <a href="https://www.youtube.com/watch?v=sAWHSQZ63Bw" target="_blank" class="btn-premium block">📹 Урок: Схуднення</a>
            <a href="https://www.youtube.com/watch?v=p5Ke5cKA5So" target="_blank" class="btn-premium block">📹 Урок: Харчування</a>
        </div>
        <button onclick="location.reload()" class="mt-8 opacity-50">Знову</button>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.glass-card').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        function finish(goal) { showScreen('donate'); }
    </script>
</body>
</html>
