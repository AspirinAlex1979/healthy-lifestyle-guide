<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Перезавантаження</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="screen-welcome" class="glass-card p-8 max-w-md w-full text-center animate__animated animate__fadeIn">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">Привіт! 👋</h1>
        <p class="text-gray-600 mb-6">Давай створимо твій персональний план відновлення за 1 хвилину.</p>
        <button onclick="nextScreen('welcome', 'q1')" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold hover:scale-105 transition-transform">Почати тест</button>
    </div>

    <div id="screen-q1" class="glass-card p-8 max-w-md w-full hidden animate__animated animate__fadeInRight">
        <h2 class="text-2xl font-bold mb-4">🥪 Твоє харчування сьогодні?</h2>
        <div class="space-y-3">
            <button onclick="saveAnswer('diet', 'bad', 'q1', 'q2')" class="w-full p-4 border rounded-xl hover:bg-indigo-50 text-left">Фастфуд, багато кави, перекуси</button>
            <button onclick="saveAnswer('diet', 'ok', 'q1', 'q2')" class="w-full p-4 border rounded-xl hover:bg-indigo-50 text-left">50/50, намагаюсь їсти домашнє</button>
            <button onclick="saveAnswer('diet', 'good', 'q1', 'q2')" class="w-full p-4 border rounded-xl hover:bg-indigo-50 text-left">Раціон збалансований</button>
        </div>
    </div>

    <div id="screen-q2" class="glass-card p-8 max-w-md w-full hidden animate__animated animate__fadeInRight">
        <h2 class="text-2xl font-bold mb-4">🏃 Як часто рухаєшся?</h2>
        <div class="space-y-3">
            <button onclick="saveAnswer('sport', 'low', 'q2', 'q3')" class="w-full p-4 border rounded-xl hover:bg-indigo-50 text-left">Сидяча робота, руху мало</button>
            <button onclick="saveAnswer('sport', 'mid', 'q2', 'q3')" class="w-full p-4 border rounded-xl hover:bg-indigo-50 text-left">Багато ходжу, легкі навантаження</button>
            <button onclick="saveAnswer('sport', 'high', 'q2', 'q3')" class="w-full p-4 border rounded-xl hover:bg-indigo-50 text-left">Регулярний спорт / Важка праця</button>
        </div>
    </div>

    <div id="screen-q3" class="glass-card p-8 max-w-md w-full hidden animate__animated animate__fadeInRight">
        <h2 class="text-2xl font-bold mb-4">🤯 Рівень стресу?</h2>
        <div class="space-y-3">
            <button onclick="generateResult('high')" class="w-full p-4 border rounded-xl hover:bg-red-50 text-left">Високий (недосип, напруга)</button>
            <button onclick="generateResult('low')" class="w-full p-4 border rounded-xl hover:bg-green-50 text-left">Помірний (все під контролем)</button>
        </div>
    </div>

    <div id="screen-result" class="glass-card p-8 max-w-2xl w-full hidden animate__animated animate__zoomIn">
        <h2 class="text-3xl font-bold text-indigo-700 mb-2">Твій персональний план 🎯</h2>
        <div id="result-text" class="prose text-gray-700 mt-4 space-y-4">
            </div>
        <button onclick="location.reload()" class="mt-8 text-indigo-600 font-semibold underline">Пройти ще раз</button>
    </div>

    <script>
        let answers = {};

        function nextScreen(current, next) {
            document.getElementById('screen-' + current).classList.add('hidden');
            document.getElementById('screen-' + next).classList.remove('hidden');
        }

        function saveAnswer(key, value, current, next) {
            answers[key] = value;
            nextScreen(current, next);
        }

        function generateResult(stressLevel) {
            answers['stress'] = stressLevel;
            document.getElementById('screen-q3').classList.add('hidden');
            const resScreen = document.getElementById('screen-result');
            const resText = document.getElementById('result-text');
            resScreen.classList.remove('hidden');

            let plan = "";

            if (answers.stress === 'high') {
                plan = `
                    <h3 class="text-xl font-bold">План: "М'яке відновлення" 🧘‍♂️</h3>
                    <p>Твій організм зараз в режимі виживання. Ніяких важких гирь!</p>
                    <ul>
                        <li><strong>Харчування:</strong> Додай магній (горіхи, насіння) та виключи цукор, він посилює тривогу.</li>
                        <li><strong>Тренування:</strong> Тільки легка розтяжка та ходьба. 15 хв зранку.</li>
                        <li><strong>Порада:</strong> Режим сну понад усе. Лягай до 23:00.</li>
                    </ul>
                `;
            } else if (answers.diet === 'bad' || answers.sport === 'low') {
                plan = `
                    <h3 class="text-xl font-bold">План: "Активне схуднення" 🔥</h3>
                    <p>Час розігнати метаболізм!</p>
                    <ul>
                        <li><strong>Харчування:</strong> "Правило тарілки": 50% овочів у кожному прийомі їжі.</li>
                        <li><strong>Тренування:</strong> 3 рази на тиждень (присідання, віджимання, планка).</li>
                        <li><strong>Ціль:</strong> 10 000 кроків щодня без виключень.</li>
                    </ul>
                `;
            } else {
                plan = `
                    <h3 class="text-xl font-bold">План: "Прогрес та сила" 💪</h3>
                    <p>Ти в гарній формі, давай її покращимо.</p>
                    <ul>
                        <li><strong>Харчування:</strong> Збільш кількість білка (2г на кг ваги).</li>
                        <li><strong>Тренування:</strong> Додай інтенсивності. 4-5 кіл вправ.</li>
                        <li><strong>Активність:</strong> Велосипед або біг у вихідні.</li>
                    </ul>
                `;
            }

            resText.innerHTML = plan;
        }
    </script>
</body>
</html>
